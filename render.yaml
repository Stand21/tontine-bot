services:
  - type: web
    name: tontine-bot
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: NOTIFY_KEY
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: TZ
        value: Africa/Abidjan
      - key: RUN_CRON
        value: "false"
